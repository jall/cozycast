[build]
  base = "app"
  # Exports the web build with source maps, uploads them to Sentry, then strips
  # the .map files from the publish dir (see app/scripts/upload-sourcemaps.sh).
  # Upload is skipped automatically when SENTRY_AUTH_TOKEN isn't set.
  command = "npm run build:web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: serve index.html for client-side routes. Netlify serves any
# existing static file (the JS bundle, assets) first, so this only catches
# unknown paths — it does not shadow /_expo/* or /assets/*.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
