name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    working-directory: app

jobs:
  check:
    name: Lint, format & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run check

  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    # Run after unit checks pass. This also gives Netlify a head start on
    # deploying the just-pushed commit before we smoke-test the live site.
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          # Defaults to the production site; override with a repo variable to
          # point at a deploy preview. Heads-up: on push to main there's a race
          # with Netlify's deploy, so this smoke-tests whatever is currently live.
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL || 'https://cozycast.jall.me' }}
          # Optional: set these repo secrets to run the signed-in + recording
          # tests. Without them, those tests skip.
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7
